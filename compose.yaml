services:
  app:
    build:
      context: ./docker/php
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    depends_on:
      mariadb:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - app

  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: parafia_laravel
      MARIADB_USER: parafia
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: secret
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "${MAILPIT_PORT:-8025}:8025"

  phpmyadmin:
    image: phpmyadmin:5.2
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      - mariadb

volumes:
  mariadb-data: